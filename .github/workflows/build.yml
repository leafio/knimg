name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Clean and update dependencies
        run: |
          go clean -modcache
          go mod tidy
          go mod download
          go mod verify
          # 检查依赖状态
          go list -m all

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          # 安装基本依赖
          sudo apt-get install -y -qq libgtk-3-dev libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev libatk1.0-dev libx11-dev libxext-dev libxtst-dev libxrender-dev libxi-dev
          # 尝试安装webkit相关包（不同Ubuntu版本可能有不同名称）
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev || sudo apt-get install -y -qq libwebkit2gtk-4.0-dev || echo "WebKit packages not found, continuing..."
          # 检查依赖安装情况
          dpkg -l | grep -E 'libgtk|webkit|libx11|libcairo|libpango'
          # 检查Go版本
          go version
          # 检查Go环境
          go env
          # 检查当前目录
          pwd
          # 检查文件结构
          ls -la

      - name: Build
        run: |
          echo "开始构建..."
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go build -ldflags="-s -w" -o knimg-windows-amd64.exe .
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            go build -ldflags="-s -w" -o knimg-darwin-amd64 .
            # Build for ARM64 as well
            GOARCH=arm64 go build -ldflags="-s -w" -o knimg-darwin-arm64 .
          else
            # 尝试构建，捕获错误
            set -x
            go build -v -ldflags="-s -w" -o knimg-linux-amd64 .
            set +x
          fi
          # 检查构建结果
          ls -la knimg-* || echo "构建文件不存在"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knimg-${{ matrix.os }}
          path: |
            knimg-*.exe
            knimg-*-amd64
            knimg-*-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/knimg-*.exe
            artifacts/**/knimg-*-amd64
            artifacts/**/knimg-*-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
