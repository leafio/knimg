name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev libgtk-3-dev

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go build -ldflags="-s -w" -o knimg-windows-amd64.exe .
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            go build -ldflags="-s -w" -o knimg-darwin-amd64 .
            # Build for ARM64 as well
            GOARCH=arm64 go build -ldflags="-s -w" -o knimg-darwin-arm64 .
          else
            go build -ldflags="-s -w" -o knimg-linux-amd64 .
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: knimg-${{ matrix.os }}
          path: |
            knimg-*.exe
            knimg-*-amd64
            knimg-*-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/knimg-*.exe
            artifacts/**/knimg-*-amd64
            artifacts/**/knimg-*-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
