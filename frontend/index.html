<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnImg - 文件管理与图片压缩工具</title>

    <!-- 引入外部 CSS 文件 -->
    <link rel="stylesheet" href="css/base.css?v=15">
    <link rel="stylesheet" href="css/layout.css?v=15">
    <link rel="stylesheet" href="css/components.css?v=15">
    <link rel="stylesheet" href="css/responsive.css?v=15">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">K</div>
            <div class="navbar-title">
                <h1>KnImg 文件管理</h1>
                <p>智能文件管理与图片压缩工具</p>
            </div>
        </div>

        <div class="navbar-path" id="navbarPath">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="path-text" id="pathText">未选择目录</span>
            <span class="btn-link" onclick="openDirectoryBrowser('workDir')">(修改)</span>
        </div>

        <div class="navbar-actions">
            <div class="stats-info" id="navbarStats" style="display: none; margin-right: 16px;">
                <div class="stat-item">
                    <span class="stat-value" id="navStatTotal">0</span>
                    <span class="stat-label">文件</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="navStatImage">0</span>
                    <span class="stat-label">图片</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="navStatDoc">0</span>
                    <span class="stat-label">文档</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="navStatVideo">0</span>
                    <span class="stat-label">视频</span>
                </div>
            </div>
            
            <button class="btn btn-refresh" id="refreshBtn" onclick="loadFiles()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                刷新列表
            </button>
            
            <div class="dropdown">
                <button class="btn btn-secondary" onclick="toggleExportMenu()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    导出
                </button>
                <div class="dropdown-menu" id="exportMenu">
                    <div class="dropdown-item" onclick="exportFiles('excel')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        Excel
                    </div>
                    <div class="dropdown-item" onclick="exportFiles('csv')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        CSV
                    </div>
                    <div class="dropdown-item" onclick="exportFiles('json')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        JSON
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧筛选面板 -->
        <aside class="filter-panel">
            <div class="filter-section">
                <div class="filter-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    搜索文件
                </div>
                <input type="text" class="filter-input" id="searchInput" placeholder="输入文件名，自动筛选...">
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                    文件大小
                </div>
                <div class="quick-presets">
                    <button class="preset-btn" onclick="applySizePreset(10)">&gt;10MB</button>
                    <button class="preset-btn" onclick="applySizePreset(50)">&gt;50MB</button>
                    <button class="preset-btn" onclick="applySizePreset(100)">&gt;100MB</button>
                    <button class="preset-btn" onclick="applySizePreset(500)">&gt;500MB</button>
                </div>
                <div id="customSizeInput" style="display: none;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="number" class="filter-input" id="minSize" placeholder="最小值" style="flex: 1;">
                        <span>~</span>
                        <input type="number" class="filter-input" id="maxSize" placeholder="最大值" style="flex: 1;">
                    </div>
                    <div style="margin-top: 8px; text-align: right; color: var(--text-secondary); font-size: 12px;">单位: MB</div>
                </div>
                <button class="btn btn-link" onclick="toggleCustomSize()" style="width: 100%; margin-top: 8px;">自定义范围</button>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5856D6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    文件类型
                </div>
                <input type="text" class="filter-input" id="fileExt" placeholder="jpg,png,pdf">
                <div style="margin-top: 8px; font-size: 12px; color: var(--text-secondary);">
                    常用: <a href="javascript:void(0)" onclick="selectExtension('jpg,jpeg,png,gif,webp')" style="color: var(--primary);">图片</a> · 
                    <a href="javascript:void(0)" onclick="selectExtension('doc,docx,xls,xlsx,ppt,pptx,pdf')" style="color: var(--primary);">文档</a> · 
                    <a href="javascript:void(0)" onclick="selectExtension('mp4,avi,mov')" style="color: var(--primary);">视频</a>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    排序方式
                </div>
                <div class="sort-group" id="sortFieldGroup">
                    <button class="sort-btn active" onclick="setSort('name')">名称</button>
                    <button class="sort-btn" onclick="setSort('size')">大小</button>
                    <button class="sort-btn" onclick="setSort('type')">类型</button>
                    <button class="sort-btn" onclick="setSort('time')">时间</button>
                </div>
                <div class="sort-group" id="sortOrderGroup" style="margin-top: 8px;">
                    <button class="sort-btn active" onclick="setSortOrder('asc')">升序 ↑</button>
                    <button class="sort-btn" onclick="setSortOrder('desc')">降序 ↓</button>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="clearFilters()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                清除筛选
            </button>
        </aside>

        <!-- 主内容区 -->
        <main class="content-area">
            <!-- 压缩面板 -->
            <div class="compress-panel" id="compressPanel">
                <div class="compress-content">
                    <div class="compress-row">
                        <div class="compress-field">
                            <div class="tooltip-wrapper">
                                <span class="tooltip-icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="16" x2="12" y2="12"></line>
                                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                    </svg>
                                </span>
                                <span class="tooltip-text">选择输出图片格式</span>
                            </div>
                            <select class="filter-input" id="compressFormatSelect" style="width: 90px; padding: 4px 8px; font-size: 12px;">
                                <option value="webp">WebP</option>
                                <option value="jpeg">JPEG</option>
                                <option value="png">PNG</option>
                                <option value="">原格式</option>
                            </select>
                        </div>

                        <div class="compress-field">
                            <div class="tooltip-wrapper">
                                <span class="tooltip-icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="16" x2="12" y2="12"></line>
                                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                    </svg>
                                </span>
                                <span class="tooltip-text">留空则覆盖原文件</span>
                            </div>
                            <div class="output-dir-input-wrapper">
                                <input type="text" class="filter-input" id="outputDir" placeholder="选择目录" style="width: 160px; padding: 4px 32px 4px 8px; font-size: 12px;">
                                <button class="output-dir-btn" onclick="openDirectoryBrowser('outputDir')">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="compress-field">
                            <div class="tooltip-wrapper">
                                <span class="tooltip-icon">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="16" x2="12" y2="12"></line>
                                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                    </svg>
                                </span>
                                <span class="tooltip-text">压缩质量 10-100</span>
                            </div>
                            <div class="quality-slider">
                                <input type="range" id="quality" min="10" max="100" value="80" style="width: 80px;">
                                <span class="quality-value" id="qualityValue" style="font-size: 12px; min-width: 32px;">80%</span>
                            </div>
                        </div>

                        <div class="compress-divider"></div>

                        <button class="btn btn-compress" id="compressBtn" onclick="compressFiles()" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 5 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="5"></line>
                            </svg>
                            压缩图片 (<span id="selectedCount">0</span>)
                        </button>
                    </div>
                </div>
            </div>

            <!-- 文件列表 -->
            <div class="file-list-container" id="fileListContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">
                        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.3;">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            <line x1="12" y1="11" x2="12" y2="17"></line>
                            <line x1="9" y1="14" x2="15" y2="14"></line>
                        </svg>
                    </div>
                    <h3>欢迎使用 KnImg</h3>
                    <p>智能文件查找与图片压缩工具</p>
                    <button class="btn btn-primary" onclick="openDirectoryBrowser('workDir')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: middle;">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        选择工作目录
                    </button>
                    
                    <div class="empty-state-steps">
                        <div class="step">
                            <div class="step-number">1</div>
                            <div class="step-title">选择目录</div>
                            <div class="step-desc">选择要分析的文件夹</div>
                        </div>
                        <div class="step">
                            <div class="step-number">2</div>
                            <div class="step-title">查找大文件</div>
                            <div class="step-desc">使用筛选条件快速定位</div>
                        </div>
                        <div class="step">
                            <div class="step-number">3</div>
                            <div class="step-title">压缩图片</div>
                            <div class="step-desc">选中图片批量压缩</div>
                        </div>
                    </div>
                </div>
                <div id="fileList" style="display: none;"></div>
            </div>
        </main>
    </div>

    <!-- 目录选择模态框 -->
    <div class="modal-overlay" id="directoryModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">选择文件夹</div>
                <button class="modal-close" onclick="closeDirectoryBrowser()">×</button>
            </div>
            <div class="modal-body">
                <div class="current-path" id="currentPath"></div>
                <div class="directory-list" id="directoryList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeDirectoryBrowser()">取消</button>
                <button class="btn btn-primary" onclick="selectDirectory()">选择此目录</button>
            </div>
        </div>
    </div>

    <!-- 压缩选项弹窗 -->
    <div class="modal-overlay" id="compressModal" style="display: none;">
        <div class="modal" style="max-width: 420px;">
            <div class="modal-header">
                <h3 style="margin: 0;">压缩选项</h3>
                <button class="modal-close" onclick="closeCompressModal()">×</button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <p style="margin: 0 0 20px 0; color: var(--text-secondary); font-size: 13px;">选择压缩后的文件保存方式：</p>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--background); border-radius: 8px; cursor: pointer; transition: all 0.2s;" 
                           onmouseover="this.style.background='var(--primary-light)'" 
                           onmouseout="this.style.background='var(--background)'">
                        <input type="radio" name="compressOption" value="overwrite" checked style="width: 18px; height: 18px;">
                        <div>
                            <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px;">覆盖原文件</div>
                            <div style="font-size: 12px; color: var(--text-secondary);">直接替换原始图片文件</div>
                        </div>
                    </label>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--background); border-radius: 8px; cursor: pointer; transition: all 0.2s;" 
                           onmouseover="this.style.background='var(--primary-light)'" 
                           onmouseout="this.style.background='var(--background)'">
                        <input type="radio" name="compressOption" value="newdir" style="width: 18px; height: 18px;">
                        <div style="flex: 1;">
                            <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px;">保存到新目录</div>
                            <div style="font-size: 12px; color: var(--text-secondary);">选择新的输出文件夹</div>
                        </div>
                    </label>
                </div>

                <div id="outputDirSelector" style="display: none; margin-top: 16px; padding: 16px; background: var(--background); border-radius: 8px;">
                    <label style="font-size: 13px; font-weight: 600; display: block; margin-bottom: 8px;">选择输出目录：</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" class="filter-input" id="modalOutputDir" placeholder="点击右侧按钮选择目录" style="flex: 1; padding: 8px; font-size: 13px;" readonly>
                        <button class="btn" onclick="openDirectoryBrowser('modalOutputDir')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCompressModal()">取消</button>
                <button class="btn btn-success" onclick="confirmCompress()" style="min-width: 100px;">开始压缩</button>
            </div>
        </div>
    </div>

    <!-- 进度覆盖层 -->
    <div class="progress-overlay" id="progressOverlay">
        <div class="progress-card">
            <h3 id="progressTitle">处理中...</h3>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <!-- 消息容器 -->
    <div id="messageContainer"></div>

    <!-- 引入外部 JavaScript 文件 -->
    <script type="module" src="js/app.js?v=15"></script>
</body>
</html>
